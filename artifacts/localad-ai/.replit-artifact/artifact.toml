kind = "web"
previewPath = "/localad-ai/"
title = "LeadFordge"
version = "1.0.0"
id = "artifacts/localad-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/localad-ai/" ]
localPort = 20889

[services.development]
run = "pnpm --filter @workspace/localad-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/localad-ai", "run", "build" ]
publicDir = "artifacts/localad-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20889"
BASE_PATH = "/localad-ai/"
